name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tests/**'

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: sudo apt-get install -y graphviz
      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest
      - name: Run test suite
        run: pytest tests/ -v

  sbom:
    name: SBOM & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft . -o cyclonedx-json=sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan SBOM for vulnerabilities
        run: |
          grype db update
          grype sbom:sbom.json --fail-on medium
        continue-on-error: true

      - name: Scan dependencies for vulnerabilities
        uses: ./.github/actions/audit-report
        continue-on-error: true

  security:
    name: Static Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: pip install bandit
      - name: Run bandit
        run: bandit -r . --exclude .venv,tests -ll

  publish:
    name: Build & Publish Binary
    runs-on: ubuntu-latest
    needs: [lint, test, sbom, security]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build standalone binary
        run: pyinstaller --onefile main.py --name optimizhelper
      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          name: optimizhelper-linux
          path: dist/optimizhelper
